name: Veille DevSecOps

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  veille:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances Python
        run: |
          pip install --upgrade pip
          pip install requests playwright python-dotenv chromadb ollama pandas openpyxl

      - name: Installer Chromium pour Playwright
        run: playwright install --with-deps chromium

      - name: Installer Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Mettre en cache les modèles Ollama
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-llama3.2-qwen2.5-7b-nomic-embed-text

      - name: Restaurer l'état de la veille (mémoire IA, historique, Excel, rapports)
        uses: actions/cache/restore@v4
        with:
          path: |
            memoire_ia
            historique_offres.json
            suivi_candidatures.xlsx
            Historique
          key: etat-veille-${{ github.run_id }}
          restore-keys: |
            etat-veille-

      - name: Démarrer Ollama et télécharger les modèles
        run: |
          ollama serve &
          sleep 5
          ollama pull llama3.2
          ollama pull qwen2.5:7b
          ollama pull nomic-embed-text

      - name: Lancer le script de veille
        env:
          FT_CLIENT_ID: ${{ secrets.FT_CLIENT_ID }}
          FT_CLIENT_SECRET: ${{ secrets.FT_CLIENT_SECRET }}
          WEBHOOK_DISCORD: ${{ secrets.WEBHOOK_DISCORD }}
        run: python veille_devsecops.py

      - name: Sauvegarder l'état de la veille pour le prochain run
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            memoire_ia
            historique_offres.json
            suivi_candidatures.xlsx
            Historique
          key: etat-veille-${{ github.run_id }}

      - name: Publier les résultats du jour en téléchargement
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: veille-devsecops-resultats-${{ github.run_id }}
          path: |
            suivi_candidatures.xlsx
            Historique
          retention-days: 30