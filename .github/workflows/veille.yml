name: Veille DevSecOps

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  veille:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Le job ne prendra que quelques minutes maintenant !
    strategy:
      fail-fast: false
      matrix:
        include:
          - groupe_id: secu
            mots_cles: "SecOps,Cloud Security Engineer,Ingénieur SecOps,Architecte Sécurité Cloud,Consultant Sécurité Cloud"
          - groupe_id: cloud-devops
            mots_cles: "DevSecOps,DevOps,Cloud Builder,Ingénieur Cloud,Ingénieur DevOps"
          - groupe_id: infra-sre
            mots_cles: "Site Reliability Engineer (SRE),Ingénieur Système et Réseau,Ingénieur de Production IT et Release Engineer"

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances Python
        run: |
          pip install --upgrade pip
          # Ollama est supprimé. Ajout de groq et sentence-transformers (pour ChromaDB)
          pip install requests playwright python-dotenv chromadb pandas openpyxl groq sentence-transformers

      - name: Installer Chromium pour Playwright
        run: playwright install --with-deps chromium

      - name: Restaurer l'état de la veille (mémoire IA, historique, Excel, rapports)
        uses: actions/cache/restore@v4
        with:
          path: |
            memoire_ia_${{ matrix.groupe_id }}
            historique_offres_${{ matrix.groupe_id }}.json
            suivi_candidatures_${{ matrix.groupe_id }}.xlsx
            Historique
          key: etat-veille-${{ matrix.groupe_id }}-${{ github.run_id }}
          restore-keys: |
            etat-veille-${{ matrix.groupe_id }}-

      - name: Lancer le script de veille - Groupe ${{ matrix.groupe_id }}
        env:
          FT_CLIENT_ID: ${{ secrets.FT_CLIENT_ID }}
          FT_CLIENT_SECRET: ${{ secrets.FT_CLIENT_SECRET }}
          WEBHOOK_DISCORD: ${{ secrets.WEBHOOK_DISCORD }}
          GROUPE_ID: ${{ matrix.groupe_id }}
          MOTS_CLES_GROUPE: ${{ matrix.mots_cles }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }} # 🔑 Ta clé Groq sécurisée
        run: python veille_devsecops.py

      - name: Sauvegarder l'état de la veille pour le prochain run
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            memoire_ia_${{ matrix.groupe_id }}
            historique_offres_${{ matrix.groupe_id }}.json
            suivi_candidatures_${{ matrix.groupe_id }}.xlsx
            Historique
          key: etat-veille-${{ matrix.groupe_id }}-${{ github.run_id }}

      - name: Publier les résultats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: veille-devsecops-${{ matrix.groupe_id }}-${{ github.run_id }}
          path: |
            suivi_candidatures_${{ matrix.groupe_id }}.xlsx
            Historique
          retention-days: 30

  fusionner:
    needs: veille
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Télécharger tous les résultats des groupes
        uses: actions/download-artifact@v4
        with:
          pattern: veille-devsecops-*-${{ github.run_id }}
          path: resultats-bruts
          merge-multiple: false

      - name: Installer les dépendances de fusion
        run: pip install pandas openpyxl

      - name: Fusionner les fichiers Excel des 3 groupes en un seul Master
        run: |
          python - <<'EOF'
          import glob
          import pandas as pd
          fichiers = glob.glob("resultats-bruts/**/suivi_candidatures_*.xlsx", recursive=True)
          if fichiers:
              dfs = [pd.read_excel(f, engine="openpyxl") for f in fichiers]
              df_final = pd.concat(dfs, ignore_index=True)
              if "Lien de l'offre" in df_final.columns:
                  df_final = df_final.drop_duplicates(subset=["Lien de l'offre"])
              df_final.to_excel("suivi_candidatures_MASTER.xlsx", index=False, engine="openpyxl")
              print(f"✅ Fusion terminée : {len(df_final)} offre(s) au total.")
          EOF

      - name: Publier le tableau de bord Excel fusionné
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: veille-devsecops-MASTER-${{ github.run_id }}
          path: |
            suivi_candidatures_MASTER.xlsx
            resultats-bruts
          retention-days: 30

      # (J'ai conservé tes étapes d'extraction de résumé et d'envoi d'e-mail ici à l'identique)
      - name: Extraire un résumé pour l'e-mail
        if: always()
        id: stats
        run: |
          python - <<'EOF' >> "$GITHUB_OUTPUT"
          import pandas as pd
          def note_numerique(valeur):
              try:
                  return float(str(valeur).replace(',', '.').split('/')[0].strip())
              except Exception:
                  return -1.0
          try:
              df = pd.read_excel("suivi_candidatures_MASTER.xlsx", engine="openpyxl")
              total = len(df)
              if total > 0 and "Score Technique" in df.columns:
                  df["_note"] = df["Score Technique"].apply(note_numerique)
                  meilleure = df.sort_values("_note", ascending=False).iloc[0]
                  resume = f"{meilleure.get('Titre du Poste', '?')} chez {meilleure.get('Entreprise', '?')} ({meilleure.get('Score Technique', '?')})"
              else:
                  resume = "Aucune offre validée aujourd'hui"
          except Exception:
              total = 0
              resume = "Fichier Master indisponible (voir logs du run)"
          print(f"total={total}\nresume={resume}")
          EOF

      - name: Envoyer l'e-mail de fin de pipeline
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          from: Veille DevSecOps <${{ secrets.EMAIL_USERNAME }}>
          to: ${{ secrets.EMAIL_USERNAME }}
          subject: ${{ needs.veille.result == 'success' && '✅ Veille DevSecOps - Run terminé' || '⚠️ Veille DevSecOps - Run terminé avec erreurs' }}
          body: |
            Résultat des 3 groupes (secu / cloud-devops / infra-sre) : ${{ needs.veille.result }}
            Offres au total dans le Master : ${{ steps.stats.outputs.total }}
            Meilleure offre du jour : ${{ steps.stats.outputs.resume }}
            Détails : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          attachments: suivi_candidatures_MASTER.xlsx